<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>AgriSmart – Auth Debug</title>
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 2rem; }
    h2 { color: #4ade80; }
    .card { background: #2a2a2a; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; color: #9ca3af; font-size: 0.85rem; margin-bottom: 0.3rem; margin-top: 0.8rem; }
    input, select { width: 100%; padding: 0.5rem; background: #333; border: 1px solid #555; color: #fff; border-radius: 6px; font-family: monospace; box-sizing: border-box; }
    button { margin-top: 1rem; margin-right: 0.5rem; padding: 0.6rem 1.2rem; background: #2D5A27; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #3a7a32; }
    .log { background: #111; border-radius: 8px; padding: 1rem; min-height: 120px; max-height: 400px; overflow-y: auto; font-size: 0.82rem; line-height: 1.8; }
    .ok   { color: #4ade80; }
    .err  { color: #f87171; }
    .info { color: #60a5fa; }
    .warn { color: #fbbf24; }
  </style>
</head>
<body>
  <h2>🌿 AgriSmart Auth Debugger</h2>

  <div class="card">
    <b style="color:#4ade80">Step 1 — Test Supabase Connection</b>
    <br><br>
    <button onclick="testConnection()">Test Connection</button>
  </div>

  <div class="card">
    <b style="color:#4ade80">Step 2 — Test Registration</b>
    <label>Full Name</label>
    <input id="reg-name" value="Test User" />
    <label>Email</label>
    <input id="reg-email" value="test@agrismart.com" />
    <label>Password</label>
    <input id="reg-pw" value="password123" />
    <label>Role</label>
    <select id="reg-role">
      <option value="worker">Worker</option>
      <option value="admin">Admin</option>
      <option value="supervisor">Supervisor</option>
    </select>
    <button onclick="testRegister()">Test Register</button>
  </div>

  <div class="card">
    <b style="color:#4ade80">Step 3 — Test Login</b>
    <label>Email</label>
    <input id="login-email" value="test@agrismart.com" />
    <label>Password</label>
    <input id="login-pw" value="password123" />
    <button onclick="testLogin()">Test Login</button>
  </div>

  <div class="card">
    <b style="color:#4ade80">Debug Log</b>
    <div class="log" id="log"></div>
    <button onclick="clearLog()" style="background:#555;margin-top:0.5rem">Clear Log</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://wrmfnsyipdtihwlnrtou.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndybWZuc3lpcGR0aWh3bG5ydG91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2OTI1MzksImV4cCI6MjA4ODI2ODUzOX0.1u2v9DJTYBBNCGT1cmlHw7IqwK9kp5TQMf0k1WWGlfw';

    let sb;

    function log(msg, type = 'info') {
      const el = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      el.innerHTML += `<div class="${type}">[${time}] ${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    }
    function clearLog() { document.getElementById('log').innerHTML = ''; }

    // ── Step 1: Test Connection ──────────────────────────────
    async function testConnection() {
      log('Testing Supabase connection...', 'info');
      try {
        if (!window.supabase) {
          log('❌ window.supabase is undefined — CDN script did not load!', 'err');
          return;
        }
        log('✅ window.supabase loaded from CDN', 'ok');

        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        log('✅ Supabase client created', 'ok');

        // Try a simple DB query
        const { data, error } = await sb.from('users').select('count').limit(1);
        if (error) {
          log(`⚠️ DB query error: ${error.message} (code: ${error.code})`, 'warn');
          log('This might be RLS blocking anon reads — that is OK for now', 'warn');
        } else {
          log('✅ DB reachable — users table responded', 'ok');
        }

        log('✅ Connection test complete', 'ok');
      } catch (err) {
        log(`❌ Exception: ${err.message}`, 'err');
      }
    }

    // ── Step 2: Test Registration ────────────────────────────
    async function testRegister() {
      if (!sb) { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }

      const name  = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pw    = document.getElementById('reg-pw').value;
      const role  = document.getElementById('reg-role').value;

      log(`Attempting registration: ${email} / role: ${role}`, 'info');

      try {
        const { data, error } = await sb.auth.signUp({
          email, password: pw,
          options: { data: { name, role } }
        });

        if (error) {
          log(`❌ signUp error: ${error.message}`, 'err');
          log(`   Status: ${error.status} | Code: ${error.code}`, 'err');
          return;
        }

        log(`✅ signUp call succeeded`, 'ok');
        log(`   data.user = ${JSON.stringify(data.user?.id ?? 'NULL')}`, data.user ? 'ok' : 'err');

        if (!data.user) {
          log('❌ data.user is NULL → Email confirmation is still ON in Supabase!', 'err');
          log('   Go to: Supabase Dashboard → Authentication → Providers → Email → disable "Confirm email"', 'warn');
          return;
        }

        log(`   User ID: ${data.user.id}`, 'ok');
        log(`   Email confirmed: ${data.user.email_confirmed_at ?? 'NOT confirmed'}`, data.user.email_confirmed_at ? 'ok' : 'warn');

        // Test inserting into public.users
        log('Trying upsert into public.users...', 'info');
        const { error: uErr } = await sb.from('users').upsert(
          { id: data.user.id, name, email, role, status: 'active' },
          { onConflict: 'id' }
        );
        if (uErr) {
          log(`❌ users upsert failed: ${uErr.message} (code: ${uErr.code})`, 'err');
        } else {
          log('✅ public.users row created', 'ok');
        }

        // Test workers insert if worker
        if (role === 'worker') {
          log('Trying insert into public.workers...', 'info');
          const { error: wErr } = await sb.from('workers').insert(
            { user_id: data.user.id, name, email, status: 'active' }
          );
          if (wErr) {
            log(`❌ workers insert failed: ${wErr.message} (code: ${wErr.code})`, 'err');
          } else {
            log('✅ public.workers row created', 'ok');
          }
        }

        log('🎉 Registration fully successful!', 'ok');
        // Pre-fill login fields
        document.getElementById('login-email').value = email;
        document.getElementById('login-pw').value = pw;

      } catch (err) {
        log(`❌ Unexpected exception: ${err.message}`, 'err');
        console.error(err);
      }
    }

    // ── Step 3: Test Login ───────────────────────────────────
    async function testLogin() {
      if (!sb) { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }

      const email = document.getElementById('login-email').value.trim();
      const pw    = document.getElementById('login-pw').value;

      log(`Attempting login: ${email}`, 'info');

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });

        if (error) {
          log(`❌ signInWithPassword error: ${error.message}`, 'err');
          log(`   Status: ${error.status} | Code: ${error.code}`, 'err');
          return;
        }

        log(`✅ Auth login succeeded`, 'ok');
        log(`   User ID: ${data.user.id}`, 'ok');

        // Fetch profile
        log('Fetching public.users profile...', 'info');
        const { data: profile, error: pErr } = await sb
          .from('users').select('*').eq('id', data.user.id).single();

        if (pErr) {
          log(`❌ Profile fetch failed: ${pErr.message} (code: ${pErr.code})`, 'err');
        } else {
          log(`✅ Profile found: name=${profile.name}, role=${profile.role}`, 'ok');
        }

        log('🎉 Login fully successful!', 'ok');

      } catch (err) {
        log(`❌ Unexpected exception: ${err.message}`, 'err');
        console.error(err);
      }
    }

    // Auto-init
    window.addEventListener('load', () => {
      log('Debug page loaded. Click "Test Connection" to start.', 'info');
      if (!window.supabase) {
        log('⚠️ Supabase CDN not yet loaded — wait a moment and retry', 'warn');
      } else {
        log('✅ Supabase CDN ready', 'ok');
        sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
      }
    });
  </script>
</body>
</html>
